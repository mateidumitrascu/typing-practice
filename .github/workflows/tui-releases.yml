name: Releases
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
permissions:
  contents: write
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          # Repository variable (Settings > Secrets and variables > Actions >
          # Variables). Falls back to the compiled-in default when unset, so
          # forks and local builds still work.
          SERVER: ${{ vars.TYPEPRACTICE_SERVER }}
        run: |
          BIN=typepractice-tui-${GOOS}-${GOARCH}
          [ "$GOOS" = "windows" ] && BIN=$BIN.exe
          PKG=github.com/mateidumitrascu/typing-practice/internal/tui
          LDFLAGS="-s -w -X main.version=${GITHUB_REF_NAME}"
          if [ -n "$SERVER" ]; then
            LDFLAGS="$LDFLAGS -X ${PKG}.DefaultServer=${SERVER}"
          else
            echo "::warning::TYPEPRACTICE_SERVER not set — using the built-in default"
          fi
          go build -ldflags "$LDFLAGS" -o "$BIN" ./cmd/tui
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: typepractice-tui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: typepractice-tui-${{ matrix.goos }}-${{ matrix.goarch }}*
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
